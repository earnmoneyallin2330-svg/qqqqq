    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        /* ============================================================
         * React Error Boundary — 防止 render error 導致空白頁
         * ============================================================ */
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, errorInfo) {
                console.error('[Badminton Digital Twin] 渲染錯誤:', error, errorInfo);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{
                            position:'fixed',inset:0,background:'#000',
                            display:'flex',alignItems:'center',justifyContent:'center',
                            fontFamily:'-apple-system, sans-serif',padding:'40px'
                        }}>
                            <div style={{ maxWidth:'500px',textAlign:'center' }}>

                                    padding:'10px 24px',borderRadius:'10px',fontSize:'14px',
                                    fontWeight:600,cursor:'pointer'
                                }}>重新整理頁面</button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        function Latex({ math, block = false }) {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current && window.katex) {
                    try {
                        window.katex.render(math, containerRef.current, { displayMode: block, throwOnError: false });
                    } catch (e) { containerRef.current.textContent = math; }
                }
            }, [math, block]);
            return <span ref={containerRef} />;
        }

        /* ============================================================
         * 🔬 羽毛微結構收縮剖面動畫元件
         * ============================================================ */
        function FeatherCrossSection({ currentSpeed, material }) {
            const canvasRef = useRef(null);
            const animRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                if (!ctx) return;

                const dpr = window.devicePixelRatio || 1;
                const rect = canvas.getBoundingClientRect();
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                const w = rect.width;
                const h = rect.height;
                const cx = w / 2;
                const cy = h / 2;

                const numFeathers = 16;
                const maxRadius = Math.min(w, h) * 0.38;
                const minRadius = maxRadius * 0.55;
                const corkRadius = maxRadius * 0.18;

                let animProgress = 0;

                const draw = () => {
                    ctx.clearRect(0, 0, w, h);

                    /* 計算收縮比例 */
                    const speedMs = currentSpeed / 3.6;
                    let contractionTarget;
                    if (material === 'natural') {
                        contractionTarget = 1 - Math.exp(-0.00035 * speedMs * speedMs);
                    } else {
                        contractionTarget = (1 - Math.exp(-0.00012 * speedMs * speedMs)) * 0.15;
                    }
                    animProgress += (contractionTarget - animProgress) * 0.08;
                    const contraction = animProgress;
                    const currentRadius = maxRadius - (maxRadius - minRadius) * contraction;

                    /* 速度標示圓環 */
                    ctx.beginPath();
                    ctx.arc(cx, cy, maxRadius + 6, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
                    ctx.lineWidth = 1;
                    ctx.stroke();

                    /* 繪製 16 根羽毛 */
                    for (let i = 0; i < numFeathers; i++) {
                        const baseAngle = (i / numFeathers) * Math.PI * 2 - Math.PI / 2;
                        const inwardAngle = contraction * 0.25;
                        const angle = baseAngle + (i % 2 === 0 ? inwardAngle : -inwardAngle);
                        const featherLen = currentRadius - corkRadius;

                        const startX = cx + Math.cos(angle) * corkRadius;
                        const startY = cy + Math.sin(angle) * corkRadius;
                        const endX = cx + Math.cos(angle) * currentRadius;
                        const endY = cy + Math.sin(angle) * currentRadius;

                        /* 羽片寬度隨收縮變窄 */
                        const featherWidth = (1 - contraction * 0.6) * 8;
                        const perpX = -Math.sin(angle) * featherWidth;
                        const perpY = Math.cos(angle) * featherWidth;

                        /* 羽毛漸層 */
                        const grad = ctx.createLinearGradient(startX, startY, endX, endY);
                        if (material === 'natural') {
                            const hue = 30 + contraction * 20;
                            grad.addColorStop(0, `hsla(${hue}, 60%, 70%, 0.9)`);
                            grad.addColorStop(1, `hsla(${hue}, 40%, 50%, 0.5)`);
                        } else {
                            grad.addColorStop(0, 'rgba(200, 200, 210, 0.8)');
                            grad.addColorStop(1, 'rgba(150, 150, 160, 0.4)');
                        }

                        ctx.beginPath();
                        ctx.moveTo(startX, startY);
                        ctx.quadraticCurveTo(
                            startX + (endX - startX) * 0.5 + perpX * 1.5,
                            startY + (endY - startY) * 0.5 + perpY * 1.5,
                            endX, endY
                        );
                        ctx.quadraticCurveTo(
                            startX + (endX - startX) * 0.5 - perpX * 1.5,
                            startY + (endY - startY) * 0.5 - perpY * 1.5,
                            startX, startY
                        );
                        ctx.fillStyle = grad;
                        ctx.fill();

                        /* 羽軸 */
                        ctx.beginPath();
                        ctx.moveTo(startX, startY);
                        ctx.lineTo(endX, endY);
                        ctx.strokeStyle = material === 'natural' ? 'rgba(180,140,80,0.6)' : 'rgba(180,180,190,0.4)';
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }

                    /* 軟木底座 */
                    const corkGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, corkRadius);
                    corkGrad.addColorStop(0, '#D4A06A');
                    corkGrad.addColorStop(1, '#8B6542');
                    ctx.beginPath();
                    ctx.arc(cx, cy, corkRadius, 0, Math.PI * 2);
                    ctx.fillStyle = corkGrad;
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                    ctx.lineWidth = 1;
                    ctx.stroke();

                    /* 面積指示環 */
                    ctx.beginPath();
                    ctx.arc(cx, cy, currentRadius, 0, Math.PI * 2);
                    ctx.strokeStyle = material === 'natural' ? 'rgba(48,209,88,0.4)' : 'rgba(100,210,255,0.3)';
                    ctx.lineWidth = 1.5;
                    ctx.setLineDash([4, 4]);
                    ctx.stroke();
                    ctx.setLineDash([]);

                    /* 文字標注 */
                    ctx.fillStyle = '#86868B';
                    ctx.font = '10px -apple-system, sans-serif';
                    ctx.textAlign = 'center';
                    const areaVal = material === 'natural'
                        ? (17 + (35 - 17) * (1 - contraction)).toFixed(1)
                        : (30.8 + (35 - 30.8) * (1 - contraction * 0.15)).toFixed(1);
                    ctx.fillText(`A = ${areaVal} cm²`, cx, h - 8);

                    const contrPct = (contraction * 100).toFixed(0);
                    ctx.fillStyle = contraction > 0.5 ? '#FF453A' : '#30D158';
                    ctx.fillText(`收縮 ${contrPct}%`, cx, 14);

                    animRef.current = requestAnimationFrame(draw);
                };

                draw();
                return () => cancelAnimationFrame(animRef.current);
            }, [currentSpeed, material]);

            return <canvas ref={canvasRef} className="w-full h-full" style={{minHeight:'140px'}} />;
        }

        /* ============================================================
         * 🎯 跨運動球速對比圖元件
         * ============================================================ */
        function SpeedComparisonChart({ shuttleSpeed }) {
            const canvasRef = useRef(null);

            const sports = [
                { name: '🏸 羽球殺球', speed: shuttleSpeed, color: '#30D158', dynamic: true },
                { name: '⛳ 高爾夫開球', speed: 339, color: '#FFD60A', dynamic: false },
                { name: '🎾 網球發球', speed: 263, color: '#BF5AF2', dynamic: false },
                { name: '🏎️ F1 極速', speed: 372, color: '#FF453A', dynamic: false },
                { name: '⚾ 棒球快速球', speed: 170, color: '#0A84FF', dynamic: false },
                { name: '⚽ 足球射門', speed: 131, color: '#64D2FF', dynamic: false },
            ];

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                if (!ctx) return;

                const dpr = window.devicePixelRatio || 1;
                const rect = canvas.getBoundingClientRect();
                if (rect.width === 0) return;
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                const w = rect.width;
                const h = rect.height;

                const sorted = [...sports].sort((a, b) => b.speed - a.speed);
                const maxSpeed = Math.max(600, shuttleSpeed + 50);
                const barH = 18;
                const gap = 6;
                const labelW = 100;
                const barAreaW = w - labelW - 60;
                const startY = 8;

                ctx.clearRect(0, 0, w, h);

                sorted.forEach((s, idx) => {
                    const y = startY + idx * (barH + gap);
                    const barWidth = (s.speed / maxSpeed) * barAreaW;

                    /* 標籤 */
                    ctx.fillStyle = s.dynamic ? '#FFFFFF' : '#86868B';
                    ctx.font = `${s.dynamic ? 'bold ' : ''}11px -apple-system, sans-serif`;
                    ctx.textAlign = 'right';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(s.name, labelW - 8, y + barH / 2);

                    /* 背景條 */
                    ctx.fillStyle = 'rgba(255,255,255,0.04)';
                    ctx.beginPath();
                    ctx.roundRect(labelW, y, barAreaW, barH, 4);
                    ctx.fill();

                    /* 實際速度條 */
                    const grad = ctx.createLinearGradient(labelW, 0, labelW + barWidth, 0);
                    grad.addColorStop(0, s.color + '33');
                    grad.addColorStop(1, s.color);
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.roundRect(labelW, y, Math.max(barWidth, 4), barH, 4);
                    ctx.fill();

                    /* 發光效果 (動態項目) */
                    if (s.dynamic) {
                        ctx.shadowBlur = 8;
                        ctx.shadowColor = s.color;
                        ctx.fillStyle = s.color;
                        ctx.beginPath();
                        ctx.roundRect(labelW, y, Math.max(barWidth, 4), barH, 4);
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    }

                    /* 速度數字 */
                    ctx.fillStyle = '#FFFFFF';
                    ctx.font = `${s.dynamic ? 'bold ' : ''}11px -apple-system, monospace`;
                    ctx.textAlign = 'left';
                    ctx.fillText(`${Math.round(s.speed)}`, labelW + barWidth + 6, y + barH / 2);
                });

                /* km/h 標注 */
                ctx.fillStyle = '#48484A';
                ctx.font = '9px -apple-system, sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText('km/h', w - 4, startY + sorted.length * (barH + gap) + 4);

            }, [shuttleSpeed]);

            return <canvas ref={canvasRef} className="w-full" style={{height: '168px'}} />;
        }

         * ============================================================ */

                },
                {

                },
                {

                    formula: "A(v) = A_{min} + (A_0 - A_{min}) \\cdot e^{-\\kappa \\cdot v^2}",
                    conclusion: "出球瞬間羽毛向內緊縮如同子彈，風阻驟降以維持超高初速；當風壓減弱，羽毛剛性使裙襬重新張開，恢復最大空氣阻力以穩定落點。這也是尼龍球（剛性不變）無法比擬之處。",
                    setup: { v0: 565, tension: 32, material: 'natural' }
                }
            ];

            const applySlideSetup = (slideIndex) => {
                const conf = slides[slideIndex].setup;
                setV0Kmh(conf.v0);
                setTension(conf.tension);
                setMaterial(conf.material);
                setActiveSlide(slideIndex);
                progressRef.current = 0; 
            };

            const handleResetView = () => {
                cameraYawRef.current = defaultYaw;
                cameraPitchRef.current = defaultPitch;
                setCameraYaw(defaultYaw);
                setCameraPitch(defaultPitch);
            };

            /* ============================================================
             * 物理模擬引擎 (ODE Solver)
             * ============================================================ */
            const simulationData = useMemo(() => {
                const m = 0.0052; 
                const rho = 1.225; 
                const Cd_base = 0.62; 
                const A0 = 0.0035; 
                const Amin = 0.0017; 
                const g = 9.81; 
                const dt = 0.0015;
                const mu = 1.81e-5; /* 空氣動力黏度 (Pa·s) */
                const D = 0.067;    /* 羽球特徵直徑 (m) */

                let t = 0;
                let v_mag = v0Kmh / 3.6; 
                /* 真實殺球模擬：
                 * ① 擊球點在中場 (z≈3m)，不是底線 — 殺球是跳起攔截高球
                 * ② 擊球高度 ~3m（跳殺最高點）
                 * ③ 下壓角度 15°~22° — 真實殺球角度陡峭
                 * ④ 距球網僅 ~3.7m，過網後在對面中前場急墜落地 */
                const rawAngleDeg = 11 + (v0Kmh / 600) * 5; // 11°~16° 的下壓角
                let angle = -1 * rawAngleDeg * (Math.PI / 180); 
                let vz = v_mag * Math.cos(angle); 
                let vy = v_mag * Math.sin(angle); 
                let vx = 0; 
                let z = 2.0, y = 3.0, x = 0;  /* 後場偏中位置起跳殺球 */

                const windRad = (windDir * Math.PI) / 180;
                const wx = windSpeed * Math.sin(windRad);
                const wz = windSpeed * Math.cos(windRad);

                const data = [];
                let maxDrag = 0;
                let iterations = 0;
                const MAX_ITERATIONS = 50000;

                while (y >= 0 && z <= 15 && iterations < MAX_ITERATIONS) {
                    iterations++;

                    const vrx = vx - wx;
                    const vry = vy;
                    const vrz = vz - wz;
                    /* ★ 除以零防護：Math.max 強制底限 */
                    const vr_mag = Math.max(Math.sqrt(vrx * vrx + vry * vry + vrz * vrz), 0.0001);

                    let A = A0;
                    if (material === 'natural') {
                        A = Amin + (A0 - Amin) * Math.exp(-0.00035 * vr_mag * vr_mag);
                    } else {
                        A = A0 * 0.88 + (A0 * 0.12) * Math.exp(-0.00012 * vr_mag * vr_mag);
                    }

                    const Fd = 0.5 * rho * vr_mag * vr_mag * Cd_base * A;
                    if (Fd > maxDrag) maxDrag = Fd;

                    /* 加速度計算（vr_mag 已有底限保護，不會除以零） */
                    const ax = -(Fd / m) * (vrx / vr_mag);
                    const ay = -g - (Fd / m) * (vry / vr_mag);
                    const az = -(Fd / m) * (vrz / vr_mag);

                    vx += ax * dt;
                    vy += ay * dt;
                    vz += az * dt;
                    x += vx * dt;
                    y += vy * dt;
                    z += vz * dt;

                    if (isNaN(x) || isNaN(y) || isNaN(z)) break;

                    v_mag = Math.sqrt(vx * vx + vy * vy + vz * vz);
                    const kineticEnergy = 0.5 * m * v_mag * v_mag;

                    /* 雷諾數計算 Re = ρvD/μ */
                    const Re = (rho * vr_mag * D) / mu;

                    t += dt;

                    if (Math.floor(t * 10000) % 30 === 0) {
                        data.push({
                            time: t, x, y, z,
                            speed: v_mag * 3.6,
                            drag: Fd, area: A,
                            kineticEnergy,
                            reynolds: Re
                        });
                    }
                }
                return { data, maxDrag };
            }, [v0Kmh, material, windSpeed, windDir]);

            /* 當 simulationData 變化時重置進度 */
            useEffect(() => {
                progressRef.current = 0;
                frameCounterRef.current = 0;
                if (simulationData.data.length > 0) {
                    setDisplayFrame(simulationData.data[0]);
                } else {
                    setDisplayFrame({ speed: v0Kmh, drag: 0, area: 0.0035, z: 2.0, x: 0, y: 3.0, reynolds: 0 });
                }
            }, [simulationData]);

            /* 相機拖曳事件 — 直接寫入 ref（零延遲），節流更新 state（給 HUD 顯示用） */
            const cameraRafRef = useRef(null);
            const updateCameraState = () => {
                setCameraYaw(cameraYawRef.current);
                setCameraPitch(cameraPitchRef.current);
                cameraRafRef.current = null;
            };
            const scheduleStateUpdate = () => {
                if (!cameraRafRef.current) {
                    cameraRafRef.current = requestAnimationFrame(updateCameraState);
                }
            };

            const handleMouseDown = (e) => {
                isDraggingRef.current = true;
                previousMousePosition.current = { x: e.clientX, y: e.clientY };
            };
            const handleMouseMove = (e) => {
                if (!isDraggingRef.current) return;
                const deltaX = e.clientX - previousMousePosition.current.x;
                const deltaY = e.clientY - previousMousePosition.current.y;
                cameraYawRef.current = Math.max(-90, Math.min(90, cameraYawRef.current - deltaX * 0.5));
                cameraPitchRef.current = Math.max(5, Math.min(45, cameraPitchRef.current - deltaY * 0.3));
                previousMousePosition.current = { x: e.clientX, y: e.clientY };
                scheduleStateUpdate();
            };
            const handleMouseUpOrLeave = () => { isDraggingRef.current = false; };

            /* 觸控支援 */
            const handleTouchStart = (e) => {
                if (e.touches.length === 1) {
                    isDraggingRef.current = true;
                    previousMousePosition.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                }
            };
            const handleTouchMove = (e) => {
                if (!isDraggingRef.current || e.touches.length !== 1) return;
                e.preventDefault();
                const deltaX = e.touches[0].clientX - previousMousePosition.current.x;
                const deltaY = e.touches[0].clientY - previousMousePosition.current.y;
                cameraYawRef.current = Math.max(-90, Math.min(90, cameraYawRef.current - deltaX * 0.5));
                cameraPitchRef.current = Math.max(5, Math.min(45, cameraPitchRef.current - deltaY * 0.3));
                previousMousePosition.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                scheduleStateUpdate();
            };
            const handleTouchEnd = () => { isDraggingRef.current = false; };

            /* ============================================================
             * 主要 3D Canvas 渲染 (含流場粒子)
             * ============================================================ */
            useEffect(() => {
                const canvas = mainCanvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                if (!ctx) return;
                const traj = simulationData.data;

                let width = 0, height = 0;
                const dpr = window.devicePixelRatio || 1;

                const resizeCanvas = () => {
                    const rect = canvas.getBoundingClientRect();
                    if (rect.width === 0 || rect.height === 0) return;
                    canvas.width = rect.width * dpr;
                    canvas.height = rect.height * dpr;
                    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                    width = rect.width;
                    height = rect.height;
                };
                resizeCanvas();
                const resizeObserver = new ResizeObserver(() => { resizeCanvas(); });
                resizeObserver.observe(canvas);

                const project = (x, y, z) => {
                    const scale = width * 0.054;
                    const offsetX = width * 0.5;
                    const offsetY = height * 0.64;
                    /* ★ 從 ref 讀取，不依賴 closure 中的 state */
                    const radYaw = (cameraYawRef.current * Math.PI) / 180;
                    const radPitch = (cameraPitchRef.current * Math.PI) / 180;
                    const cz = z - 6.7;
                    let rotX = x * Math.cos(radYaw) - cz * Math.sin(radYaw);
                    let rotZ = x * Math.sin(radYaw) + cz * Math.cos(radYaw);
                    const finalY = y * Math.cos(radPitch) + rotZ * Math.sin(radPitch);
                    const finalZ = -y * Math.sin(radPitch) + rotZ * Math.cos(radPitch);
                    const distance = 16;
                    const perspective = distance / (distance + finalZ);
                    return {
                        px: offsetX + rotX * scale * perspective,
                        py: offsetY - finalY * scale * perspective,
                        perspective
                    };
                };

                const windParticles = windParticlesRef.current;
                const flowParticles = flowParticlesRef.current;

                const drawWindParticles = () => {
                    ctx.fillStyle = 'rgba(10, 132, 255, 0.15)';
                    const windRad = (windDir * Math.PI) / 180;
                    const wx = windSpeed * Math.sin(windRad) * 0.05;
                    const wz = windSpeed * Math.cos(windRad) * 0.05;
                    windParticles.forEach(p => {
                        p.x += wx * p.speedFactor; p.z += wz * p.speedFactor;
                        if (p.z > 13.4) p.z = 0; if (p.z < 0) p.z = 13.4;
                        if (p.x > 4) p.x = -4; if (p.x < -4) p.x = 4;
                        const pos = project(p.x, p.y, p.z);
                        ctx.beginPath();
                        ctx.arc(pos.px, pos.py, 1.5 * pos.perspective, 0, Math.PI * 2);
                        ctx.fill();
                    });
                };

                /* 🌊 流場粒子視覺化 */
                const drawFlowField = (ballX, ballY, ballZ, speed) => {
                    const intensity = Math.min(speed / 500, 1);
                    if (intensity < 0.05) return;

                    flowParticles.forEach(p => {
                        p.life += 0.015 * p.speed;
                        if (p.life > 1) {
                            p.life = 0;
                            p.ox = (Math.random() - 0.5) * (1.2 - intensity * 0.6);
                            p.oy = (Math.random() - 0.5) * (1.2 - intensity * 0.6);
                            p.oz = -0.5 - Math.random() * 1.5;
                        }

                        /* 粒子從球前方往後方流動 */
                        const pz = p.oz + p.life * 3;
                        const spread = 1 + p.life * (2 + intensity * 3);
                        const px = p.ox * spread;
                        const py = p.oy * spread;

                        const worldX = ballX + px;
                        const worldY = ballY + py;
                        const worldZ = ballZ - pz;

                        if (worldZ < 0 || worldZ > 14 || worldY < 0) return;

                        const pos = project(worldX, worldY, worldZ);
                        const alpha = (1 - p.life) * intensity * 0.5;
                        const size = (1 + p.life * 2) * pos.perspective;

                        /* 壓縮波紋效果 (高速時) */
                        if (intensity > 0.6 && p.life < 0.15) {
                            ctx.strokeStyle = `rgba(255, 69, 58, ${alpha * 0.6})`;
                            ctx.lineWidth = 0.5;
                            ctx.beginPath();
                            ctx.arc(pos.px, pos.py, (8 + p.life * 30) * pos.perspective * intensity, 
                                    -Math.PI * 0.3, Math.PI * 0.3);
                            ctx.stroke();
                        }

                        /* 流線粒子 */
                        const hue = 200 + p.life * 40;
                        ctx.fillStyle = `hsla(${hue}, 80%, 70%, ${alpha})`;
                        ctx.beginPath();
                        ctx.arc(pos.px, pos.py, size, 0, Math.PI * 2);
                        ctx.fill();
                    });
                };

                const drawCourt = () => {
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = 'rgba(13, 85, 52, 0.2)';
                    ctx.beginPath();
                    const c1 = project(-3.05,0,0), c2 = project(3.05,0,0);
                    const c3 = project(3.05,0,13.4), c4 = project(-3.05,0,13.4);
                    ctx.moveTo(c1.px,c1.py); ctx.lineTo(c2.px,c2.py);
                    ctx.lineTo(c3.px,c3.py); ctx.lineTo(c4.px,c4.py);
                    ctx.closePath(); ctx.fill();

                    ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(c1.px,c1.py); ctx.lineTo(c2.px,c2.py);
                    ctx.lineTo(c3.px,c3.py); ctx.lineTo(c4.px,c4.py);
                    ctx.closePath(); ctx.stroke();

                    const lines = [
                        [{x:-2.59,z:0},{x:-2.59,z:13.4}],[{x:2.59,z:0},{x:2.59,z:13.4}],
                        [{x:-3.05,z:1.98},{x:3.05,z:1.98}],[{x:-3.05,z:11.42},{x:3.05,z:11.42}],
                        [{x:-3.05,z:0.76},{x:3.05,z:0.76}],[{x:-3.05,z:12.64},{x:3.05,z:12.64}],
                        [{x:0,z:0},{x:0,z:1.98}],[{x:0,z:11.42},{x:0,z:13.4}]
                    ];
                    ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                    lines.forEach(pts => {
                        ctx.beginPath();
                        pts.forEach((pt,i) => {
                            const {px,py} = project(pt.x,0,pt.z);
                            if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
                        }); ctx.stroke();
                    });

                    /* Net */
                    ctx.fillStyle = 'rgba(10,132,255,0.08)'; ctx.strokeStyle = 'rgba(10,132,255,0.25)';
                    ctx.beginPath();
                    const n1=project(-3.05,0,6.7), n2=project(3.05,0,6.7);
                    const n3=project(3.05,1.55,6.7), n4=project(-3.05,1.55,6.7);
                    ctx.moveTo(n1.px,n1.py); ctx.lineTo(n2.px,n2.py);
                    ctx.lineTo(n3.px,n3.py); ctx.lineTo(n4.px,n4.py);
                    ctx.closePath(); ctx.fill(); ctx.stroke();

                    ctx.strokeStyle = 'rgba(10,132,255,0.04)';
                    for(let i=1;i<10;i++){
                        const r=i/10;
                        const hs=project(-3.05,1.55*r,6.7), he=project(3.05,1.55*r,6.7);
                        ctx.beginPath(); ctx.moveTo(hs.px,hs.py); ctx.lineTo(he.px,he.py); ctx.stroke();
                    }
                    ctx.lineWidth=3; ctx.strokeStyle='#0A84FF';
                    ctx.beginPath();
                    ctx.moveTo(n1.px,n1.py); ctx.lineTo(n4.px,n4.py);
                    ctx.moveTo(n2.px,n2.py); ctx.lineTo(n3.px,n3.py);
                    ctx.stroke();
                };

                const drawTrajectory = (idx) => {
                    if (traj.length === 0) return;
                    const maxIdx = Math.max(0, Math.min(idx, traj.length - 1));

                    ctx.beginPath();
                    for (let i = 0; i <= maxIdx; i++) {
                        const pt = traj[i];
                        if (!pt) continue;
                        const {px,py} = project(pt.x, pt.y, pt.z);
                        if (i === 0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
                    }
                    ctx.strokeStyle = '#30D158'; ctx.lineWidth = 2.5;
                    ctx.shadowBlur = 12; ctx.shadowColor = '#30D158';
                    ctx.stroke(); ctx.shadowBlur = 0;

                    const current = traj[maxIdx];
                    if (!current) return;

                    /* 🌊 流場粒子 */
                    drawFlowField(current.x, current.y, current.z, current.speed);

                    const cPos = project(current.x, current.y, current.z);
                    const sPos = project(current.x, 0, current.z);

                    ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.setLineDash([4,4]);
                    ctx.beginPath(); ctx.moveTo(cPos.px,cPos.py); ctx.lineTo(sPos.px,sPos.py);
                    ctx.stroke(); ctx.setLineDash([]);

                    ctx.fillStyle = 'rgba(0,0,0,0.6)';
                    ctx.beginPath(); ctx.arc(sPos.px,sPos.py, 6*cPos.perspective, 0, Math.PI*2); ctx.fill();

                    ctx.fillStyle = '#FFFFFF'; ctx.shadowBlur = 15; ctx.shadowColor = '#FFFFFF';
                    ctx.beginPath(); ctx.arc(cPos.px,cPos.py, 5*cPos.perspective, 0, Math.PI*2); ctx.fill();
                    ctx.shadowBlur = 0;
                };

                let lastTime = performance.now();
                const render = (timestamp) => {
                    const now = timestamp || performance.now();
                    // 限制最大 deltaTime = 0.1 秒，避免切換分頁回來時球瞬間飛走
                    const deltaTime = Math.min((now - lastTime) / 1000, 0.1);
                    lastTime = now;

                    if (width===0||height===0) { animationRef.current=requestAnimationFrame(render); return; }
                    ctx.fillStyle = '#070708'; ctx.fillRect(0,0,width,height);
                    drawCourt();
                    if (windSpeed > 0) drawWindParticles();
                    
                    if (isPlaying && traj.length > 0) {
                        // 以 60fps 為基準的等速播放，不管 60Hz 還是 144Hz 螢幕，1 秒都前進 60 幀的資料量
                        progressRef.current += 60 * deltaTime;
                        if (progressRef.current >= traj.length) progressRef.current = 0;
                    }
                    
                    const currentIdx = Math.floor(progressRef.current);
                    drawTrajectory(currentIdx);

                    frameCounterRef.current += 1;
                    if (frameCounterRef.current % 6 === 0) {
                        const safeIdx = Math.max(0, Math.min(currentIdx, traj.length - 1));
                        const frame = traj[safeIdx];
                        if (frame) setDisplayFrame(frame);
                    }
                    animationRef.current = requestAnimationFrame(render);
                };

                animationRef.current = requestAnimationFrame(render);
                return () => { cancelAnimationFrame(animationRef.current); resizeObserver.disconnect(); };
            }, [simulationData, isPlaying, windSpeed, windDir]);
            /* ★ cameraYaw/cameraPitch 已從依賴移除，動畫迴圈透過 ref 即時讀取 */

            /* 速度/阻力圖表 */
            useEffect(() => {
                const canvas = chartCanvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                if (!ctx) return;
                const traj = simulationData.data;
                const drawChart = () => {
                    const dpr = window.devicePixelRatio || 1;
                    const rect = canvas.getBoundingClientRect();
                    if (rect.width===0||rect.height===0) return;
                    canvas.width=rect.width*dpr; canvas.height=rect.height*dpr;
                    ctx.setTransform(dpr,0,0,dpr,0,0);
                    const w=rect.width, h=rect.height;
                    ctx.clearRect(0,0,w,h);
                    if (traj.length===0) return;
                    const padding=30, graphW=w-padding*2, graphH=h-padding-15;
                    ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1;
                    for(let i=0;i<=4;i++){
                        const y=15+(graphH/4)*i;
                        ctx.beginPath(); ctx.moveTo(padding,y); ctx.lineTo(w-padding,y); ctx.stroke();
                    }
                    ctx.beginPath();
                    traj.forEach((pt,idx)=>{
                        const xc=padding+(pt.z/13.4)*graphW;
                        const yc=15+graphH-(pt.speed/600)*graphH;
                        if(idx===0) ctx.moveTo(xc,yc); else ctx.lineTo(xc,yc);
                    });
                    ctx.strokeStyle='#BF5AF2'; ctx.lineWidth=2.5; ctx.stroke();
                    ctx.beginPath();
                    traj.forEach((pt,idx)=>{
                        const xc=padding+(pt.z/13.4)*graphW;
                        const yc=15+graphH-(pt.drag/40)*graphH;
                        if(idx===0) ctx.moveTo(xc,yc); else ctx.lineTo(xc,yc);
                    });
                    ctx.strokeStyle='#FF453A'; ctx.lineWidth=1.8; ctx.stroke();
                    ctx.fillStyle='#86868B'; ctx.font='10px sans-serif';
                    ctx.fillText('0m',padding,h-5);
                    ctx.fillText('6.7m',padding+graphW/2-10,h-5);
                    ctx.fillText('13.4m',padding+graphW-25,h-5);
                };
                drawChart();
                const ro = new ResizeObserver(()=>{drawChart();}); ro.observe(canvas);
                return ()=>{ro.disconnect();};
            }, [simulationData]);

            /* 動能/面積圖表 */
            useEffect(() => {
                const canvas = energyCanvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                if (!ctx) return;
                const traj = simulationData.data;
                const drawEnergy = () => {
                    const dpr = window.devicePixelRatio || 1;
                    const rect = canvas.getBoundingClientRect();
                    if (rect.width===0||rect.height===0) return;
                    canvas.width=rect.width*dpr; canvas.height=rect.height*dpr;
                    ctx.setTransform(dpr,0,0,dpr,0,0);
                    const w=rect.width, h=rect.height;
                    ctx.clearRect(0,0,w,h);
                    if (traj.length===0) return;
                    const padding=30, graphW=w-padding*2, graphH=h-padding-15;
                    ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1;
                    for(let i=0;i<=4;i++){
                        const y=15+(graphH/4)*i;
                        ctx.beginPath(); ctx.moveTo(padding,y); ctx.lineTo(w-padding,y); ctx.stroke();
                    }
                    ctx.beginPath();
                    traj.forEach((pt,idx)=>{
                        const xc=padding+(pt.z/13.4)*graphW;
                        const yc=15+graphH-(pt.kineticEnergy/80)*graphH;
                        if(idx===0) ctx.moveTo(xc,yc); else ctx.lineTo(xc,yc);
                    });
                    ctx.strokeStyle='#FFD60A'; ctx.lineWidth=2.5; ctx.stroke();
                    ctx.beginPath();
                    traj.forEach((pt,idx)=>{
                        const xc=padding+(pt.z/13.4)*graphW;
                        const na=(pt.area-0.0015)/(0.0040-0.0015);
                        const yc=15+graphH-na*graphH;
                        if(idx===0) ctx.moveTo(xc,yc); else ctx.lineTo(xc,yc);
                    });
                    ctx.strokeStyle='#64D2FF'; ctx.lineWidth=1.8; ctx.stroke();
                    ctx.fillStyle='#86868B'; ctx.font='10px sans-serif';
                    ctx.fillText('0m',padding,h-5);
                    ctx.fillText('6.7m',padding+graphW/2-10,h-5);
                    ctx.fillText('13.4m',padding+graphW-25,h-5);
                };
                drawEnergy();
                const ro = new ResizeObserver(()=>{drawEnergy();}); ro.observe(canvas);
                return ()=>{ro.disconnect();};
            }, [simulationData]);

            /* 隱藏 Loading Screen */
            useEffect(() => {
                if (window.__hideLoading) window.__hideLoading();
            }, []);

            const currentFrame = displayFrame;
            const elasticEnergy = (0.5 * 0.0052 * Math.pow(v0Kmh / 3.6, 2) * (tension / 30)).toFixed(1);

            /* 📊 雷諾數分析 */
            const currentRe = currentFrame.reynolds || 0;
            const reFormatted = currentRe > 1000 ? (currentRe / 1000).toFixed(1) + 'k' : Math.round(currentRe);
            const flowRegime = currentRe > 200000 ? '完全紊流' : currentRe > 100000 ? '過渡區' : currentRe > 2000 ? '紊流' : '層流';
            const flowColor = currentRe > 200000 ? '#FF453A' : currentRe > 100000 ? '#FF9F0A' : currentRe > 2000 ? '#FFD60A' : '#30D158';

            return (
                <div className="flex flex-col min-h-screen px-4 md:px-10 py-6 max-w-[1400px] mx-auto">

                        </div>
                    )}

                    {/* Tab: 羽毛微結構剖面 */}
                    {analysisTab === 'feather' && (
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <div className="bg-[#1C1C1E] rounded-2xl p-5 border border-[#2c2c2e] flex flex-col shadow-lg">
                                <h3 className="text-xs font-bold text-[#86868B] tracking-widest uppercase mb-3 flex items-center gap-2">
                                    <i className="fa-solid fa-feather text-[#BF5AF2]"></i> 羽毛微結構俯視剖面（即時動畫）
                                </h3>
                                <div className="flex-grow flex items-center justify-center bg-black/30 rounded-xl border border-white/5">
                                    <FeatherCrossSection currentSpeed={currentFrame.speed} material={material} />
                                </div>
                                <p className="text-[10px] text-[#48484A] mt-2 text-center">
                                    {material === 'natural' ? '天然鵝毛：速度越快收縮越明顯' : '尼龍塑膠：形變極小，幾乎剛性'} · 即時反映動畫球速
                                </p>
                            </div>
                            <div className="bg-[#1C1C1E] rounded-2xl p-5 border border-[#2c2c2e] flex flex-col shadow-lg">
                                <h3 className="text-xs font-bold text-[#86868B] tracking-widest uppercase mb-3 flex items-center gap-2">
                                    <i className="fa-solid fa-microscope text-[#64D2FF]"></i> 氣動彈性收縮原理
                                </h3>
                                <div className="bg-black/40 rounded-xl p-4 mb-4 border border-white/5 flex items-center justify-center">
                                    <Latex math="A(v) = A_{min} + (A_0 - A_{min}) \cdot e^{-\kappa v^2}" block={true} />
                                </div>
                                <div className="space-y-3 text-xs leading-relaxed flex-grow">
                                    <div className="flex items-start gap-3">
                                        <div className="w-8 h-8 rounded-lg bg-[#FF453A]/10 flex items-center justify-center flex-shrink-0 mt-0.5">
                                            <i className="fa-solid fa-bolt text-[#FF453A] text-sm"></i>
                                        </div>
                                        <div>
                                            <div className="font-semibold text-white mb-0.5">高速階段 (400+ km/h)</div>
                                            <p className="text-[#86868B]">16 根鵝毛受風壓向內收縮至 A_min ≈ 17 cm²，阻力面積減少 51%，如同子彈穿越空氣。</p>
                                        </div>
                                    </div>
                                    <div className="flex items-start gap-3">
                                        <div className="w-8 h-8 rounded-lg bg-[#30D158]/10 flex items-center justify-center flex-shrink-0 mt-0.5">
                                            <i className="fa-solid fa-expand text-[#30D158] text-sm"></i>
                                        </div>
                                        <div>
                                            <div className="font-semibold text-white mb-0.5">低速階段 (&lt;100 km/h)</div>
                                            <p className="text-[#86868B]">風壓降低，羽毛自然剛性使裙襬恢復 A₀ ≈ 35 cm²，最大化空氣阻力以穩定落點。</p>
                                        </div>
                                    </div>
                                    <div className="flex items-start gap-3">
                                        <div className="w-8 h-8 rounded-lg bg-[#BF5AF2]/10 flex items-center justify-center flex-shrink-0 mt-0.5">
                                            <i className="fa-solid fa-circle-xmark text-[#BF5AF2] text-sm"></i>
                                        </div>
                                        <div>
                                            <div className="font-semibold text-white mb-0.5">尼龍球的缺陷</div>
                                            <p className="text-[#86868B]">剛性塑膠裙無法產生自適應形變，高速時阻力過大、低速時又不夠穩定，飛行特性遠遜天然球。</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
